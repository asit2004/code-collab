version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: codecollab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: codecollab-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/codingplatform
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=changeme_in_production
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
